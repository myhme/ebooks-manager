<!-- src/webui/templates/downloads.html -->
{% extends "layout.html" %}
{% block content %}
<h3>Downloads</h3>
<div class="mb-3">
  <button id="refreshBtn" class="btn btn-sm btn-secondary" onclick="refreshStatus()">Refresh</button>
  <button class="btn btn-sm btn-danger" onclick="clearCompleted()">Clear completed</button>
</div>

<table class="table table-sm">
  <thead class="table-light">
    <tr>
      <th>#</th><th>Title</th><th>Author</th><th>Status</th><th>Progress</th><th>Priority</th><th>Actions</th>
    </tr>
  </thead>
  <tbody id="downloadsBody">
    <tr><td colspan="7" class="small-txt">Loading...</td></tr>
  </tbody>
</table>
{% endblock %}

{% block scripts %}
<script>
let pollInterval = 5000;
async function refreshStatus() {
  try {
    const res = await fetch('/webui/api/status');
    const json = await res.json();
    renderStatus(json);
  } catch (e) {
    console.error(e);
  }
}
function renderStatus(data) {
  const tb = document.getElementById('downloadsBody');
  tb.innerHTML = '';
  if (!data || !data.queue) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="7" class="small-txt">No queue data</td>';
    tb.appendChild(tr);
    return;
  }
  data.queue.forEach((item, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${idx+1}</td>
      <td>${item.title || item.id}</td>
      <td>${item.author || ''}</td>
      <td>${item.status || ''}</td>
      <td><div class="progress"><div class="progress-bar" role="progressbar" style="width:${(item.progress||0)}%">${(item.progress||0)}%</div></div></td>
      <td>${item.priority||0}</td>
      <td>
        <button class="btn btn-sm btn-danger" onclick="cancelDownload('${item.id}')">Cancel</button>
      </td>`;
    tb.appendChild(tr);
  });
}
async function cancelDownload(id) {
  try {
    const r = await fetch('/api/download/' + id + '/cancel', {method:'DELETE'});
    const j = await r.json();
    alert(JSON.stringify(j));
    refreshStatus();
  } catch (e) {
    console.error(e);
    alert('Failed to cancel: ' + e);
  }
}
async function clearCompleted() {
  try {
    const r = await fetch('/api/queue/clear', {method:'DELETE'});
    const j = await r.json();
    alert(JSON.stringify(j));
    refreshStatus();
  } catch (e) {
    console.error(e);
  }
}
setInterval(refreshStatus, pollInterval);
refreshStatus();
</script>
{% endblock %}
