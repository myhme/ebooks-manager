{% extends "layout.html" %}
{% block title %}Status{% endblock %}
{% block content %}
  <h2>Status</h2>
  <div class="controls">
    <button id="refreshStatusBtn" class="btn">🔄 Refresh</button>
  </div>

  <h3>Queue</h3>
  <div id="queuePanel">
    {% include "partials/queue_panel.html" %}
  </div>

  <h3>Active</h3>
  <div id="statusActiveTableContainer">
    <table id="status-active-table" class="books-table">
      <thead>
        <tr>
          <th>Book</th>
          <th>Status</th>
          <th>Progress</th>
          <th>Priority</th>
          <th>Action</th>
        </tr>
      </thead>
      {% include "partials/active_table.html" %}
    </table>
  </div>
{% endblock %}
