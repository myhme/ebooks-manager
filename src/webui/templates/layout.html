<!-- src/webui/templates/layout.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ title if title else "Ebooks Manager" }}</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      .cover-thumb { width: 60px; height: 90px; object-fit: cover; }
      .small-txt { font-size: .9rem; color: #666; }
      .serial-col { width: 60px; }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Ebooks Manager</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('shelf_view', shelf_name='to-read') }}">to-read</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('shelf_view', shelf_name='read') }}">read</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('shelf_view', shelf_name='to-download') }}">to-download</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('downloads_page') }}">Downloads</a></li>
          </ul>
          <span class="navbar-text text-light small-txt">Web UI</span>
        </div>
      </div>
    </nav>

    <div class="container">
      {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
