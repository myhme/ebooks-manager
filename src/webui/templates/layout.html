<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="60">
    <title>{% block title %}Ebooks Manager{% endblock %}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 2rem;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            color: #2c3e50;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 0.5rem;
        }
        nav {
            margin-bottom: 1rem;
        }
        nav a {
            margin-right: 1rem;
            text-decoration: none;
            color: #2980b9;
        }
        nav a.active {
            font-weight: bold;
            color: #2c3e50;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 1rem;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            vertical-align: top;
            word-break: break-word;
        }
        th {
            background-color: #f8f8f8;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #fdfdfd;
        }
        .status-success { color: #27ae60; font-weight: bold; }
        .status-failure { color: #c0392b; font-weight: bold; }
        .status-no_results { color: #f39c12; }
        .status-found { color: #2980b9; }
        pre {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 1rem;
            border-radius: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
        }
        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9em;
            color: #777;
        }
        code {
            background: #eee;
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{% block header %}Ebooks Manager{% endblock %}</h1>
        <nav>
            <a href="{{ url_for('status') }}" class="{{ 'active' if request.endpoint in ['status', 'index'] else '' }}">Status</a>
            <a href="{{ url_for('history') }}" class="{{ 'active' if request.endpoint == 'history' else '' }}">History</a>
            <a href="{{ url_for('sync') }}" class="{{ 'active' if request.endpoint == 'sync' else '' }}">Sync</a>
            <a href="{{ url_for('shelf_view', shelf_name='to-download') }}">To-Download Shelf</a>
        </nav>
        {% block content %}{% endblock %}
        <div class="footer">
            Ebooks Manager
        </div>
    </div>
</body>
</html>
