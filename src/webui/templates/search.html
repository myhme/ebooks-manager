{% extends "layout.html" %}
{% block title %}Manual Search{% endblock %}
{% block content %}
  <h2>Manual Search</h2>
  <form id="manualSearchForm" class="controls">
    <input type="text" id="searchQuery" placeholder="Enter title, author, or ISBN" style="flex:1; padding:6px; border:1px solid #ddd; border-radius:4px;">
    <button class="btn primary">Search</button>
  </form>
  <div id="manualSearchResult" class="status-panel small">No results yet.</div>
{% endblock %}
